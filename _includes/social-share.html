<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
  <h4 class="page__share-title">
    {{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}
  </h4>
  {% endif %}

  <a
    href="https://twitter.com/intent/tweet?{% if site.twitter.username %}via={{ site.twitter.username | url_encode }}&{% endif %}text={{ page.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}"
    class="btn btn--twitter"
    onclick="window.open(this.href, 'window', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Twitter"
    ><i class="fab fa-fw fa-twitter" aria-hidden="true"></i
    ><span> Twitter</span></a
  >

  <a
    href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}"
    class="btn btn--facebook"
    onclick="window.open(this.href, 'window', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Facebook"
    ><i class="fab fa-fw fa-facebook" aria-hidden="true"></i
    ><span> Facebook</span></a
  >

  <a
    href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url | url_encode }}"
    class="btn btn--linkedin"
    onclick="window.open(this.href, 'window', 'left=20,top=20,width=500,height=500,toolbar=1,resizable=0'); return false;"
    title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} LinkedIn"
    ><i class="fab fa-fw fa-linkedin" aria-hidden="true"></i
    ><span> LinkedIn</span></a
  >

  <script src="//developers.kakao.com/sdk/js/kakao.min.js"></script>
  <script>
    Kakao.init("50acc34e2d88e22c81bb3bb5d8090a6e");
    function sendLink() {
      Kakao.Link.sendCustom({
        templateId: 25472,
        templateArgs: {
          title: "판교 맛집에 들르다. 다양하고 풍부한 퓨전 한정식. 깔끔한 내부 인테리어 라이언",
          description: "부담없는 가격에 푸짐하게 즐기는 점심메뉴 런치한정식, 불고기정식, 돼지 김치찌개 등",
        },
      });
    }
  </script>
  <a id="kakao-link-btn" href="javascript:sendLink()">
    <img src="//developers.kakao.com/assets/img/about/logos/kakaolink/kakaolink_btn_medium.png" />
  </a>
</section>
